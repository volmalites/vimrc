# ── Plugins ──────────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-save-interval '15'
set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'   # NEW: restores pane content too

# ── Terminal & Color ──────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"                        # was screen-256color
set -ga terminal-overrides ",*256col*:Tc"                      # stripped broken sitm/ritm overrides
set -ga terminal-overrides "*:RGB"                             # NEW: proper true-color fallback
set -as terminal-features ",*:RGB"                             # NEW: tmux ≥3.2 true-color feature flag

# ── General Settings ──────────────────────────────────────────────────────────
set -sg escape-time 0                   # was 10; 0 is safe now (Neovim/Vim prefer this)
set -g focus-events on                  # NEW: lets Neovim/editors know when pane gains focus
set -g mouse off                         # NEW: click to select panes/windows, scroll works
set -g history-limit 50000              # NEW: was default 2000
set -g set-clipboard off                 # NEW: sync with system clipboard via OSC 52
set -g detach-on-destroy off            # NEW: switch to another session instead of exiting
set -g renumber-windows on              # NEW: keep window numbers gapless after closing one
set -g base-index 1                     # NEW: windows start at 1 (easier keyboard reach)
set -g pane-base-index 1               # NEW: panes start at 1 too
set -g monitor-activity off
set -g visual-activity off

# ── Status Bar ────────────────────────────────────────────────────────────────
set -g status-position top              # NEW: status bar on top feels more modern
set -g status-interval 5               # NEW: refresh every 5s (default is 15)
set -g status-style bg=#1a1a2e,fg=#40E0D0

set -g status-left-length 40
set -g status-left "#[bg=#40E0D0,fg=#1a1a2e,bold] #S #[bg=#1a1a2e,fg=#40E0D0] "
set -g status-right "#[fg=#888888]%H:%M  %d %b "

set -g window-status-format         "#[fg=#888888] #I:#W "
set -g window-status-current-format "#[bg=#40E0D0,fg=#1a1a2e,bold] #I:#W "

# ── Borders ───────────────────────────────────────────────────────────────────
set -g pane-border-style         "fg=#333355"          # dimmer inactive border
set -g pane-active-border-style  "fg=#40E0D0"

# ── Key Bindings ──────────────────────────────────────────────────────────────
# Your original zoom+choose-tree binding (kept)
bind-key a resize-pane -Z \; choose-tree "resize-pane -Z \; select-window -t '%%'"

# Your manual save binding (kept)
bind-key S run-shell ~/.tmux/plugins/tmux-continuum/scripts/continuum_save.sh

# NEW: intuitive pane splits that open in current directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# NEW: vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# NEW: reload config in-place
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# ── TPM (keep last) ───────────────────────────────────────────────────────────
run '~/.tmux/plugins/tpm/tpm'
